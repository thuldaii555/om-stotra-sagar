<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Om Stotra Sagar - A Sanatan devotional library of stotras, mantras, pooja guides, and Hindu stories in Nepali and English." />
    <meta property="og:title" content="Om Stotra Sagar" />
    <meta property="og:description" content="Sanatan devotional library - stotras, mantras, deities, pooja guides." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#ff6b35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Om Stotra Sagar" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23ff6b35'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='32' fill='white'%3E%E0%A5%90%3C/text%3E%3C/svg%3E" />
    <title>Om Stotra Sagar - Sanatan Devotional Library</title>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a2e;
        background: linear-gradient(180deg, #fffaf1 0%, #f5f2ed 48%, #f7f3ee 100%);
      }

      #root {
        min-height: 100vh;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      img,
      svg,
      video,
      canvas {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Some libraries try to polyfill fetch and fail because window.fetch is a getter in this environment
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: (v) => { console.warn('Attempted to overwrite fetch ignored:', v); }
        });
      } catch (e) {
        console.warn('Failed to guard fetch:', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A devotional Hindu website for stotras, gods and goddesses, pooja bidhi, short stories, Panchang, favorites, and local reading." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23ff6b35'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='32' fill='white'%3E%E0%A5%90%3C/text%3E%3C/svg%3E" />
    <title>Om Stotra Sagar</title>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a2e;
        background: linear-gradient(180deg, #fffaf1 0%, #f5f2ed 48%, #f7f3ee 100%);
      }

      #root {
        min-height: 100vh;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      img,
      svg,
      video,
      canvas {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Some libraries try to polyfill fetch and fail because window.fetch is a getter in this environment
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: (v) => { console.warn('Attempted to overwrite fetch ignored:', v); }
        });
      } catch (e) {
        console.warn('Failed to guard fetch:', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
